services:
  - type: web
    name: soft-skill-dashboard
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: MONGODB_DB
        value: soft_skill_dashboard
      - key: SMTP_PORT
        value: 587
      - key: SMTP_SECURE
        value: false
